resolver 127.0.0.11 valid=30s;

split_clients "${remote_addr}${time_iso8601}" $backend {
    33.3%  "fightclubservice-b4bye5fxhec7hzhn.mexicocentral-01.azurewebsites.net";
    33.3%  "fightclubservice2-c2g5c0b5gwg2axcs.mexicocentral-01.azurewebsites.net";
    *      "fightclubservice3-hxgndmfegnhjamd0.mexicocentral-01.azurewebsites.net";
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - FightLoadbalancer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1BEF79B3C6714761BFF8DD4CB18B3109 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_8B4402B3940E438E8B056FB124FB0CB8 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1BEF79B3C6714761BFF8DD4CB18B3109 }}/nginx-balancer:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B6FEE8BD1F3E4B15AB8C0720694927E0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BA377ECA52274496A9EF2F6D64D6FFBE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EE65092EA9C64C688C3B02C15334A6A2 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'FightLoadbalancer'
          slot-name: 'Production'
          images: 'ghcr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1BEF79B3C6714761BFF8DD4CB18B3109 }}/nginx-balancer:${{ github.sha }}'
          
